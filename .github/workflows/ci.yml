name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate skill metadata
        run: node scripts/validate-skills.js

      - name: Build index
        run: node scripts/build-index.js

      - name: Verify generated index is committed
        run: git diff --exit-code skills-index.json

      - name: Test CLI
        run: npm test
