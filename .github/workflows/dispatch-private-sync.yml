name: Dispatch Private Sync

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger gooseworks private sync workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GOOSEWORKS_APP_REPO_TOKEN }}
          repository: ${{ secrets.GOOSEWORKS_APP_REPO }}
          event-type: goose_skills_updated
          client-payload: '{"source":"goose-skills","ref":"${{ github.ref }}","sha":"${{ github.sha }}"}'
